<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback & Reviews | Harihar Car Carriers</title>
    <base href="./" />
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png" />
    
    <link rel="stylesheet" href="../css/components/navbar.css" />
    <link rel="stylesheet" href="../css/components/middle-navbar.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components/feedback.css" />
    <link rel="stylesheet" href="../css/pages/reviews.css" />
    <link rel="stylesheet" href="../css/components/review-card.css" />
    <link rel="stylesheet" href="../css/components/review-modal.css" />
    <link rel="stylesheet" href="../css/components/review-stats.css" />
    <link rel="stylesheet" href="../css/components/glowing-input.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../css/components/modern-reviews.css" />

  </head>
  <body>
    <header>
      <div id="scroll-progress"></div>
      <div id="navbar-container"></div>
    </header>

    <main>
      <div class="feedback-header enhanced-header">
        <h1>⭐ Customer Reviews & Feedback</h1>
        <p>Real experiences from customers who trusted Harihar Car Carriers</p>
      </div>

      <div id="reviewModal" class="custom-modal-overlay">
        <div class="custom-modal-content">
          <div class="modal-header">
            <h2>Write a Review</h2>
            <button id="closeModalBtn" class="close-modal-btn">&times;</button>
          </div>
          <form class="feedback-form" id="feedbackForm">
            <label for="picUrl">Profile Image URL</label>
            <input type="url" id="picUrl" placeholder="Paste your profile image URL or use default" />

            <label for="productImgUrl">Vehicle/Delivery Image URL (Optional)</label>
            <input type="url" id="productImgUrl" placeholder="Paste product/car image URL" />

            <label for="username">Your Name <span style="color:red">*</span></label>
            <input type="text" id="username" placeholder="E.g. John Doe" required />

            <label>Rate your experience <span style="color:red">*</span></label>
            <div class="star-rating" id="starRating">
              <i class="fa-regular fa-star" data-star="1"></i>
              <i class="fa-regular fa-star" data-star="2"></i>
              <i class="fa-regular fa-star" data-star="3"></i>
              <i class="fa-regular fa-star" data-star="4"></i>
              <i class="fa-regular fa-star" data-star="5"></i>
            </div>

            <label for="message">Detailed Feedback <span style="color:red">*</span></label>
            <textarea id="message" placeholder="Tell us about your experience with our service..." required></textarea>

            <div class="modal-actions">
              <button type="button" id="cancelModalBtn" class="cancel-btn">Cancel</button>
              <button type="submit" class="submit-btn">Submit Review</button>
            </div>
          </form>
        </div>
      </div>
            <section id="reviews" class="customer-reviews-section">
        <div class="container">
          <div class="featured-reviews-header fade-in">
            <div class="header-text-group">
              <h2 style="margin:0;">Verified Reviews</h2>
              <p style="color: #64748b; margin-top: 4px;">
                See what our customers say about our service
              </p>
            </div>
            <div class="header-action-group">
              <a href="https://www.google.com/search?kgmid=/g/11jkyzsdlk#lrd=0x3bd4ebc5c00444b7:0x108aba1b13bceede,1,,,,"
                 target="_blank"
                 class="secondary-action-btn">
                 <i class="fa-brands fa-google"></i> See All Google Reviews
              </a>
              
              <a href="https://www.google.com/search?q=Harihar+Car+Carriers+Nagpur#lrd=0x3bd4ebc5c00444b7:0x108aba1b13bceede,3" target="_blank" class="primary-action-btn" style="text-decoration: none; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-pen-to-square"></i> Write a Review
              </a>
            </div>
          </div>
          <div class="reviews-controls">
            <div id="servicesReviewStats"></div>
            <div class="review-filters">
              <button class="review-filter-btn active" data-rating="all">All Reviews</button>
              <button class="review-filter-btn" data-rating="5">5 ★</button>
              <button class="review-filter-btn" data-rating="4">4 ★</button>
              <button class="review-filter-btn" data-rating="3">3 ★</button>
              <button class="review-filter-btn" data-rating="2">2 ★</button>
              <button class="review-filter-btn" data-rating="1">1 ★</button>
            </div>
          </div>
        </div>
      </section>

      <section class="testimonials-carousel-section">
        <div class="swiper testimonialsSwiper">
          <div class="swiper-wrapper" id="swiperWrapper">
            </div>
          <div class="swiper-pagination" style="bottom: -5px;"></div>
        </div>
      </section>
    </main>

    <footer>
      <div id="footer-container"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../js/modules/search.js"></script>
    <script src="../js/modules/loading-state-manager.js"></script>
    <script src="../js/modules/page-navigation-loader.js"></script>
    <script src="../js/modules/navbar-loader.js?v=2"></script>
    <script src="../js/modules/footer-loader.js"></script>
    <script src="../js/modules/themes.js"></script>
    <script src="../js/modules/component-initializer.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/reviews-data.js"></script>
  </body>
</html>
