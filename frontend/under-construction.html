<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <link rel="stylesheet" href="./css/under-construction.css">
</head>

<body>
    <div class="card-container">
        <div class="animation-panel">

            <div class="passing-sign">
                <div class="neon-arrow"></div>
                <div class="neon-arrow"></div>
                <div class="neon-arrow"></div>
            </div>

            <div class="crane-assembly">
                <div class="crane-line"></div>
                <div class="crane-hook">
                    <div class="laser-beam"></div>
                </div>
            </div>

            <div class="truck-assembly">

                <div class="trailer-bed">
                    <div class="covered-car">
                        <div class="cloth-highlight"></div>
                        <div class="tail-light-glow"></div>
                        <div class="car-headlight-glow"></div>
                    </div>
                </div>

                <div class="truck-cab">
                    <div class="window"></div>
                    <div class="grill"></div>
                    <div class="truck-headlight"></div>
                </div>

                <div class="wheel w-1">
                    <div class="hubcap"></div>
                </div>
                <div class="wheel w-2">
                    <div class="hubcap"></div>
                </div>
                <div class="wheel w-3">
                    <div class="hubcap"></div>
                </div>
                <div class="wheel w-4">
                    <div class="hubcap"></div>
                </div>
            </div>

            <div class="barricade left-barricade">
                <div class="caution-light"></div>
            </div>
            <div class="barricade right-barricade">
                <div class="caution-light"></div>
            </div>

            <div class="road-surface">
                <div class="lane-lines"></div>
            </div>

        </div>

        <div class="text-panel">
            <h1 class="title">Under<br>Construction</h1>
            <p class="subtitle">We're preparing this route for you.</p>

            <div class="action-buttons">
                <a href="/" class="btn-primary">Go Home</a>
                <button onclick="history.back()" class="btn-secondary">Go Back</button>
            </div>

            <div class="footer-tip">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <span>Tip: Check back soon, this feature is on the way!</span>
            </div>
        </div>
    </div>
</body>

</html>
